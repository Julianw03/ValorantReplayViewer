name: test-and-create-artifacts
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            backend/pnpm-lock.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Prepare frontend
        run: |
          cd frontend
          pnpm ci

      - name: Test frontend
        run: |
          cd frontend
          pnpm run typescript-check

      - name:  Build frontend
        run: |
          cd frontend
          pnpm run build 

      - name: Setup backend
        run: |
            cd backend
            mkdir -p public
            cp -r ../frontend/dist/* public/
            pnpm ci

      - name: Generate Riot API types
        run: |
            cd backend
            pnpm run generate

      - name: Run backend tests
        run: |
          cd backend
          pnpm run test

      - name: Build  backend
        run: |
          cd backend
          pnpm run build

      - name: Upload backend bundle
        uses: actions/upload-artifact@v4
        with:
          name: backend-bundle
          path: |
            backend/dist
            backend/package.json
            backend/package-lock.json