name: release-artifacts
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: |
          cd frontend
          npm ci
          npm run build

      - run: |
          cd backend
          mkdir -p public
          cp -r ../frontend/dist/* public/
          npm ci
          npm run generate
          npm run build

      - name: Upload backend bundle
        uses: actions/upload-artifact@v4
        with:
          name: backend-bundle
          path: |
            backend/dist
            backend/package.json
            backend/package-lock.json

  package-windows:
    runs-on: windows-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-bundle
          path: backend

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: |
          cd backend
          npm ci
          npm run package

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: backend/binaries

  release:
    runs-on: ubuntu-latest
    needs: package-windows

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: windows


      - name: Prepare release assets
        run: |
          mkdir release
          cp windows/*.exe release/

      - name: Create Checksums
        run: |
          cd release
          # We should only have binaries in this folder, so creating checksums for all files should be fine.
          for file in *; do
            sha256sum "$file" > "$file.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: release/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}